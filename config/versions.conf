# --- SECURITY / PDF TOOLS ---

# pdfcpu -- independent (Go) PDF parser used to validate sanitized output and as a
# defense-in-depth rebuilder. github type -> auto-bumped to the latest release.
PDFCPU_TYPE="github"
PDFCPU_REPO="pdfcpu/pdfcpu"
PDFCPU_TAG_PREFIX="v"
PDFCPU_VERSION="0.13.0"
PDFCPU_PROBE="bin:pdfcpu"

# restic -- backup engine. The Debian apt build lags years behind (no compression,
# missing fixes), so we install the official prebuilt binary, SHA256-verified, and
# purge the apt version. Auto-bumped by update-versions.yml.
RESTIC_TYPE="github"
RESTIC_REPO="restic/restic"
RESTIC_TAG_PREFIX="v"
RESTIC_VERSION="0.19.0"
RESTIC_PROBE="bin:restic"

# pdfid -- Didier Stevens' structural PDF triage script (single self-contained
# .py). Pinned to a reviewed commit: this script is run against untrusted PDFs,
# so it is NOT auto-bumped (raw type returns the cached value). To update, review
# upstream then bump the commit in the URL and PDFID_VERSION together.
PDFID_TYPE="raw"
PDFID_URL="https://raw.githubusercontent.com/DidierStevens/DidierStevensSuite/104bb4fe77e24f0891a954af349449227d06f77d/pdfid.py"
PDFID_VERSION="104bb4f"

# YARA ruleset -- Florian Roth's signature-base (the LOKI/THOR open ruleset) for
# the sanitize signature gate. General malware rules (also catch payloads embedded
# in a PDF, e.g. webshells/EXEs), not PDF-specific. Tracks the latest BRANCH and
# is refreshed (shallow pull) at most once a day by the yara-rules task -- kept
# current like ClamAV's freshclam. To freeze instead, set BRANCH to a commit sha.
# (YARA rules are declarative data, not code: the worst a bad rule does is a
# false positive, which the gate-before-defang turns into a recoverable quarantine.)
YARA_RULES_TYPE="git"
YARA_RULES_REPO="Neo23x0/signature-base"
YARA_RULES_BRANCH="master"
YARA_RULES_VERSION="master"

