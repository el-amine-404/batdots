# ------------------------------------------------------------------------------
# Registry -- Source of Truth
#
# Central registry for every external dependency (Media, Fonts, Tools).
#   - WHERE it comes from  (TYPE + REPO/BUCKET/URL)
#   - WHAT version is cached  (VERSION -- updated by scripts/maintenance/fetch-versions.sh)
#   - ASSET pattern for downloads (optional)
#   - HOW to detect the installed copy (PROBE -- read by lib/status.sh, offline)
#
# Source types:
#   github       -> GitHub Releases API
#   gitlab       -> GitLab Tags (via ls-remote)
#   googlestorage-> GCS JSON API
#   git          -> Tracked by branch, no tags
#   fixed        -> Static release
#
# PROBE format (installed-version detection, consumed by lib/status.sh --
# powers `package-status` and doctor's version-drift check, no network):
#   bin:NAME[:REGEX]   resolve NAME, read its version flag (override extract REGEX)
#   pkgconfig:MODULE   pkg-config --modversion MODULE
#   path:PATH          presence only (dir/file exists) -> present/missing, no version
#   (omitted)          -> n/a, skipped in version comparison
# ------------------------------------------------------------------------------

