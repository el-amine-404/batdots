PROFILE=minimal-to-desktop

# Path: a minimal Debian/Ubuntu install (no X, no DE) -> full openbox desktop.
# Run after `repos` has populated sources.list (it's the first task below).

SYSTEM_TASKS=(
  local-init
  repos           # only fires on pure Debian; harmless on derivatives
  sudoers         # ensure $USER is in the sudo group
  local-libs      # /usr/local/lib + PKG_CONFIG_PATH for source-built tools
  browser-policies
  lightdm         # install service enable + greeter selection
  nemo-actions    # link personal .nemo_action files alongside downloaded ones
  sxhkd
  brightness
)

# Same package set as `desktop` -- that's the point: bring a minimal box
# up to a fully-fledged desktop in one shot.
PACKAGES=(
  core
  build
  dev
  fonts
  media
  docs
  gui
  desktop
  security
  network
  audio
  peripherals
)

EXTERNAL=()

SYMLINKS=(
  common
  desktop
)
