PROFILE=desktop

# Phase 1 -- system configuration tasks, run in order.
SYSTEM_TASKS=(
  local-init        # seed local/*.example -> local/* (fatals first run to force review)
  repos             # extra apt sources (Debian/Ubuntu); harmless on derivatives
  sudoers           # ensure $USER is in the sudo group
  local-libs        # /usr/local/lib + PKG_CONFIG_PATH for source-built externals
  grub              # bootloader tuning
  rust              # rustup toolchain
  flatpak           # flatpak + flathub remote
  browser-policies  # managed browser policies
  lightdm           # display manager + greeter
  mimeapps          # default-application associations
  firejail          # sandbox profiles
  nemo-actions      # personal + bundled nemo actions
  xxkb              # keyboard-layout indicator
  sxhkd             # hotkey daemon
  brightness        # backlight setup
  flameshot         # screenshot tool
  obs-studio        # OBS config
  vscode            # vscode system integration
  user-services     # enable systemd user services/timers (restic, etc.)
)

# Phase 2 -- package groups (config/packages/<group>.txt).
PACKAGES=(
  core
  build
  dev
  fonts
  media
  docs
  gui
  desktop
  security
  network
  audio
  peripherals
)

# Phase 3 -- external builds/installs, run in order (build deps matter).
EXTERNAL=(
  # -- media stack (source-built; order follows MEDIA_STACK_COMPONENTS) --
  nasm
  meson
  vulkan-headers
  vulkan-loader
  libaom
  libdav1d
  libde265
  libx264
  libx265
  libvpx
  libopus
  lame
  libwebp
  libjxl
  libsvtav1
  libraw
  exiv2
  libfdk-aac
  libplacebo
  libdisplay-info
  libvmaf
  libheif
  libavif
  ffmpeg
  imagemagick
  mpv
  yt-dlp

  # -- fonts --
  fonts

  # -- terminals, shells & CLI tools --
  alacritty
  kitty
  rofi
  starship
  git-completion
  nano
  ghostscript
  7zip
  pdfcpu
  pdfid
  yara-rules
  restic
  toolbox

  # -- icons & themes --
  papirus-icons
  icons
  themes-gtk
  themes-openbox
  themes-lxterminal

  # -- JVM & build toolchain --
  sdkman
  java
  maven
  gradle
  groovy
  ant
  springboot
  node

  # -- editors --
  vscode

  # -- browsers --
  brave
  firefox
  chrome

  # -- containers & VMs --
  docker
  virtualbox
)

SYMLINKS=(
  common
  desktop
)
