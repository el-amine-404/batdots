--screenshot-format=png
--screenshot-template='%X{fallback}%f__%wH-%wM-%wS-%wT'

# +---+---+---+---+---+---+---+---+---+---+---+
# | W | A | T | C | H | | L | A | T | E | R |
# +---+---+---+---+---+---+---+---+---+---+---+
# This config dir is symlinked from the dotfiles repo (~/.config/mpv ->
# apps/mpv), so mpv's default watch-later location (<configdir>/watch_later)
# would write playback-resume state straight back into the repo. Redirect it to
# the XDG state dir (~/.local/state/mpv/watch_later) to keep runtime cruft out.
watch-later-dir=~~state/watch_later

