# Play video with window border and decorations.
# Since this is on by default, use --no-border to disable the standard window decorations.

no-border

# Enable printing a progress bar under the status line on the terminal. (Disabled by default.)
term-osd-bar


# Start the player in paused state. (no autoplay)
# pause


cursor-autohide-fs-only=yes                     # If this option is given, the cursor is always visible in windowed mode


# cursor-autohide=<number|no|always>
# number  : Make mouse cursor automatically hide after given number of milliseconds.
# no      : disable cursor autohide.
# always  : cursor will stay hidden.

cursor-autohide=1000




# --osd-level=<0-3>
# Specifies which mode the OSD should start in.
#
#   0: OSD completely disabled (subtitles only)
#   1: enabled (shows up only on user interaction)
#   2: enabled + current time visible by default
#   3: enabled + --osd-status-msg (current time and status by default)

# osd-level=1

# Show OSD times with fractions of seconds (in millisecond precision).
# Useful to see the exact timestamp of a video frame.

osd-fractions

osd-playing-msg='file: ${filename}'

# --loop-file=<N|inf|no>, --loop=<N|inf|no>
#
#   N   : Loop a single file N times.
#   inf : Loop the file forever
#   no  : normal playback.
#
# NOTE:
# For compatibility, --loop-file and --loop-file=yes are also accepted, and are the same as --loop-file=inf.
#
# The difference to --loop-playlist is that this doesn't loop the playlist, just the file itself.
# If the playlist contains only a single file, the difference between the two option is that this option
# performs a seek on loop, instead of reloading the file.


loop-file=inf


