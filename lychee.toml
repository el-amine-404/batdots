# lychee configuration
# https://github.com/lycheeverse/lychee#configuration-file

# ONLY check these file types (Regex)
include = [
  '.*\.md$'
]

# Exclude directories (Regex patterns for paths)
exclude_path = [
  '\.git',
  'apps/.*',
  'config/.*',
  'node_modules/.*',
  'lib/.*'
]

# URLs or patterns to ignore
exclude = [
  'localhost',
  '127.0.0.1',
  'http://0.0.0.0',
]

# Accept 200 (Success) or 429 (Too Many Requests / Rate Limit)
accept = [200, 429]

# Increase timeout for slow hosts like gnu.org
timeout = 60

# Max retries for external links
max_retries = 4

# Specific settings for slow hosts
[hosts."www.gnu.org"]
concurrency = 1
request_interval = "1s"
