name: Bug report
description: Something doesn't work as documented.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we recreate the issue?
      placeholder: |
        1. Run ...
        2. Set ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and Output
      description: Paste relevant output from the command or `bin/doctor.sh`.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Ubuntu 24.04 / Bash 5.2"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Repository Commit
      description: Output of `git rev-parse --short HEAD`.
    validations:
      required: true
