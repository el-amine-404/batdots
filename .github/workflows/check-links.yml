name: check-links

on:
  pull_request:
    paths:
      - "**/*.md"
  schedule:
    # Sundays at 08:00 UTC
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  local-links:
    name: check local links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check local links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --config lychee.toml .
          fail: true

  external-links:
    name: check external links
    # Only run on schedule or manual trigger to avoid PR flakiness
    if:
      github.event_name == 'schedule' || github.event_name ==
      'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        id: lychee
        with:
          args: --no-progress --config lychee.toml .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on dead links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Dead links detected in Markdown"
          content-filepath: ./lychee/out.md
          labels: |
            automation
            bug
