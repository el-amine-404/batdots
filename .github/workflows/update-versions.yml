name: update-versions

# Run scripts/maintenance/fetch-versions.sh on a schedule. If versions.conf changed,
# open a pull request with the diff so a human reviews before anything builds.

on:
  schedule:
    # Every day at 06:00 UTC -- low-traffic window so it doesn't fight CI runs.
    - cron: "0 6 * * *"
  workflow_dispatch: # Lets you trigger manually from the Actions tab.

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh versions.conf
        run: ./scripts/maintenance/fetch-versions.sh

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- config/versions.conf; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "summary<<EOF"
              git diff -- config/versions.conf | grep -E '^[+-][A-Z_]+_VERSION=' | sort
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/update-versions
          base: ${{ github.event.repository.default_branch }}
          commit-message: "chore(versions): refresh upstream versions"
          title: "chore(versions): refresh upstream versions"
          body: |
            Scheduled refresh of `config/versions.conf`.

            ```diff
            ${{ steps.diff.outputs.summary }}
            ```

            Generated by `.github/workflows/update-versions.yml`.
          labels: |
            automation
            dependencies
          delete-branch: true
